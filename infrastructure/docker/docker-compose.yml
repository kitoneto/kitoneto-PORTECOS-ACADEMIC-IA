version: '3.9'

services:
  # ==================
  # Frontend (Next.js)
  # ==================
  web:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile
      target: web-production
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - API_URL=http://api:4000
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    depends_on:
      - api
    restart: unless-stopped

  # ==================
  # API (Express)
  # ==================
  api:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile
      target: api-production
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://portecos:password@postgres:5432/portecos_academic
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ==================
  # PostgreSQL
  # ==================
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: portecos_academic
      POSTGRES_USER: portecos
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../database/schemas/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ../../database/seeds/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portecos -d portecos_academic"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==================
  # Redis (Cache)
  # ==================
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==================
  # pgAdmin (Dev only)
  # ==================
  pgadmin:
    image: dpage/pgadmin4:latest
    profiles: ["dev"]
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@portecosacademic.ao
      PGADMIN_DEFAULT_PASSWORD: admin123
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
